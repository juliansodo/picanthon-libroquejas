<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./design-tokens.css" />
    <link rel="stylesheet" href="./sidebar.css" />
    <title>Libro de Quejas</title>
  </head>
  <body>
    <main class="popup-root">
      <header class="header">
        <img src="./assets/logo.png" alt="logo" />
        <h1 class="title">Libro de quejas</h1>
      </header>

      <section class="section-box" id="tutorialView">
        <h2 class="section-title">Cómo funciona</h2>
        <ol class="tutorial-list">
          <li>Navegás cualquier página.</li>
          <li>Seleccionás lo que te molesta.</li>
          <li>Dejás tu queja anónima.</li>
          <li>Otras personas la ven y reaccionan.</li>
        </ol>
      </section>

      <section class="section-box" id="featuredView">
        <h2 class="section-title">🔥 Quejas destacadas</h2>
        <div class="featured-list" id="featuredList"></div>
        <button class="link-button featured-action" id="viewAllBtn">Ver todas las quejas</button>
      </section>

      <section class="section-box hidden" id="allView">
        <div class="all-view-head">
          <button class="link-button all-back-button" id="backBtn">← Volver</button>
          <h2 class="section-title">Todas las quejas</h2>
        </div>
        <div class="all-list" id="allList"></div>
        <div class="pagination">
          <button class="link-button" id="prevPageBtn">Anterior</button>
          <span id="pageInfo"></span>
          <button class="link-button" id="nextPageBtn">Siguiente</button>
        </div>
      </section>

      <footer class="lq-card footer-user" id="mainFooter">
        <div class="footer-user-left">
          <span class="footer-user-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M5 20a7 7 0 0 1 14 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <p class="footer-alias" id="footerAlias">@usuario</p>
        </div>
        <button class="edit-button" id="editAliasBtn" title="Editar alias">✏️</button>
      </footer>
    </main>

    <script type="module" src="./sidebar.js"></script>
  </body>
</html>
